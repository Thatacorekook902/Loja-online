<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Moderna</title>

<style>

/* RESET */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
header{
    width: 100%;
    background: #111;
    color: white;
    text-align: center;
    padding: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

header h1{
    font-size: 40px;
    margin-bottom: 10px;
    color: #00f2fe;
}

header p{
    color: #ccc;
    font-size: 18px;
}

/* CONTAINER */
.produtos{
    width: 100%;
    max-width: 1200px;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;

    gap: 30px;
    padding: 50px 20px;
}

/* CARD */
.card{
    background: white;
    width: 280px;
    border-radius: 20px;
    overflow: hidden;

    text-align: center;

    box-shadow: 0 10px 20px rgba(0,0,0,0.2);

    transition: 0.4s;
}

.card:hover{
    transform: translateY(-10px) scale(1.03);
}

/* IMAGEM */
.card img{
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* TÍTULO */
.card h2{
    margin-top: 15px;
    color: #222;
    font-size: 24px;
}

/* TEXTO */
.card p{
    margin: 15px 0;
    font-size: 24px;
    font-weight: bold;
    color: #00a651;
}

/* BOTÃO */
button{
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    color: white;

    border: none;
    padding: 12px 25px;

    border-radius: 10px;

    margin-bottom: 20px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;
}

button:hover{
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    transform: scale(1.05);
}

</style>
</head>
<body>

<header>
    <h1>Minha Loja</h1>
    <p>Produtos modernos e organizados</p>
</header>

<section class="produtos">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800" alt="Tênis">
        <h2>Tênis Nike</h2>
        <p>R$ 299,90</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800" alt="Relógio">
        <h2>Relógio</h2>
        <p>R$ 199,90</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800" alt="Celular">
        <h2>Smartphone</h2>
        <p>R$ 1.299,90</p>
        <button>Comprar</button>
    </div>

</section>

</body>
</html>
